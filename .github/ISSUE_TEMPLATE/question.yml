name: ❓ Question
description: Ask a question about IndusMind AI
title: "[Question]: "
labels: ["question"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Have a question about IndusMind AI? Please check the [documentation](../../docs/) first, then feel free to ask here.

  - type: textarea
    id: question
    attributes:
      label: Your Question
      description: What would you like to know?
    validations:
      required: true

  - type: dropdown
    id: topic
    attributes:
      label: Topic
      options:
        - Installation / Setup
        - Configuration
        - Frontend Development
        - Backend Development
        - AI Pipeline
        - Docker / Deployment
        - Architecture / Design
        - General
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any additional context that might help us answer your question.
