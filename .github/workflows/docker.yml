name: Docker

on:
  pull_request:
    branches: [main]
    paths:
      - "docker/**"
      - "backend/**"
      - "frontend/**"

jobs:
  docker-build:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -f docker/backend.Dockerfile -t indusmind-backend ./backend

      - name: Build frontend image
        run: docker build -f docker/frontend.Dockerfile -t indusmind-frontend ./frontend
